[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

# Pass build arguments to Dockerfile
[build.buildArgs]
DATABASE_URL = "${{Postgres.DATABASE_URL}}"
# IMPORTANT: Set this to your actual Railway domain
# Railway will replace ${{RAILWAY_PUBLIC_DOMAIN}} with your deployment URL
NEXT_PUBLIC_SITE_URL = "https://${{RAILWAY_PUBLIC_DOMAIN}}"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

# Health check disabled - Railway will assume service is ready immediately
# This avoids healthcheck timeouts during Prisma generation
# The service will start accepting traffic as soon as the container runs
